<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUEGP - Detailed Interaction Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .timeline-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .service-box {
            transition: all 0.3s ease;
        }
        
        .service-box.active {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            transform: scale(1.05);
        }
        
        .arrow-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 2s linear forwards;
        }
        
        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }
        
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            overflow-x: auto;
        }
        
        .method-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .method-get { background: #10b981; color: white; }
        .method-post { background: #3b82f6; color: white; }
        .method-put { background: #f59e0b; color: white; }
        
        .status-200 { background: #10b981; color: white; }
        .status-400 { background: #ef4444; color: white; }
        .status-401 { background: #f59e0b; color: white; }
        
        .protocol-badge {
            background: #8b5cf6;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-lg shadow-xl p-8 mb-8">
            <h1 class="text-4xl font-bold mb-2">Detailed Interaction Flow</h1>
            <p class="text-purple-100 text-lg">Complete technical breakdown of service-to-service communication</p>
        </div>

        <!-- Scenario Selector -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Select Scenario</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <button onclick="loadFlow('business-license')" class="p-4 border-2 border-purple-400 rounded-lg hover:bg-purple-50 transition">
                    <div class="text-3xl mb-2">🏢</div>
                    <div class="font-semibold text-sm">Business License</div>
                </button>
                <button onclick="loadFlow('authentication')" class="p-4 border-2 border-green-400 rounded-lg hover:bg-green-50 transition">
                    <div class="text-3xl mb-2">🔐</div>
                    <div class="font-semibold text-sm">Authentication</div>
                </button>
                <button onclick="loadFlow('validation')" class="p-4 border-2 border-red-400 rounded-lg hover:bg-red-50 transition">
                    <div class="text-3xl mb-2">✅</div>
                    <div class="font-semibold text-sm">Validation Check</div>
                </button>
                <button onclick="loadFlow('payment')" class="p-4 border-2 border-emerald-400 rounded-lg hover:bg-emerald-50 transition">
                    <div class="text-3xl mb-2">💳</div>
                    <div class="font-semibold text-sm">Payment Flow</div>
                </button>
                <button onclick="loadFlow('notification')" class="p-4 border-2 border-blue-400 rounded-lg hover:bg-blue-50 transition">
                    <div class="text-3xl mb-2">🔔</div>
                    <div class="font-semibold text-sm">Notification</div>
                </button>
            </div>
        </div>

        <!-- Timeline Container -->
        <div id="timelineContainer"></div>

        <!-- Legend -->
        <div class="bg-white rounded-lg shadow-lg p-6 mt-8">
            <h3 class="text-xl font-bold text-gray-900 mb-4">Legend</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <div class="font-semibold text-sm mb-2">HTTP Methods</div>
                    <div class="space-y-1">
                        <span class="method-badge method-get">GET</span>
                        <span class="method-badge method-post">POST</span>
                        <span class="method-badge method-put">PUT</span>
                    </div>
                </div>
                <div>
                    <div class="font-semibold text-sm mb-2">Status Codes</div>
                    <div class="space-y-1">
                        <span class="method-badge status-200">200 OK</span>
                        <span class="method-badge status-400">400 Error</span>
                        <span class="method-badge status-401">401 Unauthorized</span>
                    </div>
                </div>
                <div>
                    <div class="font-semibold text-sm mb-2">Protocols</div>
                    <div class="space-y-1">
                        <span class="protocol-badge">HTTP/REST</span>
                        <span class="protocol-badge">Kafka/Events</span>
                    </div>
                </div>
                <div>
                    <div class="font-semibold text-sm mb-2">Data Format</div>
                    <div class="space-y-1">
                        <span class="text-xs bg-gray-200 px-2 py-1 rounded">JSON</span>
                        <span class="text-xs bg-gray-200 px-2 py-1 rounded">JWT</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const flows = {
            'business-license': {
                title: 'Business License - Complete Flow',
                description: 'End-to-end flow from login to document delivery',
                steps: [
                    {
                        step: 1,
                        from: { name: 'Client Portal', icon: '👤', color: 'blue' },
                        to: { name: 'API Gateway', icon: '🚪', color: 'purple' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/api/auth/login',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'User-Agent': 'Mesob-Portal/1.0'
                        },
                        request: {
                            username: 'john.doe@example.com',
                            password: '********',
                            rememberMe: true,
                            deviceId: 'device-uuid-123'
                        },
                        processing: 'API Gateway validates request format, checks rate limits (100 req/min), and forwards to Authentication Service',
                        condition: 'User clicks "Login" button after entering credentials',
                        timing: '< 50ms'
                    },
                    {
                        step: 2,
                        from: { name: 'API Gateway', icon: '🚪', color: 'purple' },
                        to: { name: 'Authentication Service', icon: '🔐', color: 'green' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/internal/auth/validate',
                        headers: {
                            'X-Request-ID': 'req-uuid-456',
                            'X-Forwarded-For': '192.168.1.100',
                            'Content-Type': 'application/json'
                        },
                        request: {
                            credentials: {
                                username: 'john.doe@example.com',
                                passwordHash: 'bcrypt-hash-here'
                            },
                            metadata: {
                                ipAddress: '192.168.1.100',
                                userAgent: 'Mesob-Portal/1.0',
                                deviceId: 'device-uuid-123'
                            }
                        },
                        processing: 'Authentication Service verifies credentials against database, checks account status (active/locked), validates password hash using bcrypt',
                        condition: 'Valid credentials format received',
                        timing: '100-200ms'
                    },
                    {
                        step: 3,
                        from: { name: 'Authentication Service', icon: '🔐', color: 'green' },
                        to: { name: 'API Gateway', icon: '🚪', color: 'purple' },
                        protocol: 'HTTP/REST',
                        method: 'RESPONSE',
                        statusCode: '200 OK',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Request-ID': 'req-uuid-456'
                        },
                        response: {
                            success: true,
                            userId: 'usr-123456',
                            token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...',
                            refreshToken: 'refresh-token-xyz',
                            expiresIn: 3600,
                            user: {
                                id: 'usr-123456',
                                name: 'John Doe',
                                email: 'john.doe@example.com',
                                roles: ['citizen']
                            }
                        },
                        processing: 'JWT token generated with user claims (userId, roles, permissions), signed with HS256 algorithm, valid for 1 hour',
                        condition: 'Credentials valid and account active',
                        timing: '50-100ms'
                    },
                    {
                        step: 4,
                        from: { name: 'Client Portal', icon: '👤', color: 'blue' },
                        to: { name: 'Service Catalog', icon: '📚', color: 'yellow' },
                        protocol: 'HTTP/REST',
                        method: 'GET',
                        endpoint: '/api/services?category=business&language=en',
                        headers: {
                            'Authorization': 'Bearer eyJhbGci...',
                            'Accept-Language': 'en',
                            'Content-Type': 'application/json'
                        },
                        processing: 'Service Catalog queries database filtered by category, retrieves multilingual metadata, includes provider mappings',
                        condition: 'User authenticated, searches for business services',
                        timing: '100-150ms',
                        response: {
                            services: [
                                {
                                    id: 'svc-business-license',
                                    name: 'Business License Application',
                                    category: 'business',
                                    provider: 'Ministry of Trade',
                                    fee: 500.00,
                                    currency: 'ETB',
                                    processingTime: '5 business days',
                                    requirements: [
                                        'National ID',
                                        'Business Plan',
                                        'Lease Agreement'
                                    ]
                                }
                            ]
                        }
                    },
                    {
                        step: 5,
                        from: { name: 'Client Portal', icon: '👤', color: 'blue' },
                        to: { name: 'Validation Service', icon: '✅', color: 'red' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/api/validate/business-name',
                        headers: {
                            'Authorization': 'Bearer eyJhbGci...',
                            'Content-Type': 'application/json'
                        },
                        request: {
                            businessName: 'ABC Trading PLC',
                            businessType: 'PLC',
                            region: 'Addis Ababa',
                            sector: 'Import/Export'
                        },
                        processing: 'Validation Service checks business name uniqueness, applies naming rules, queries external registries',
                        condition: 'User enters business name and tabs out of field (blur event)',
                        timing: '200-500ms'
                    },
                    {
                        step: 6,
                        from: { name: 'Validation Service', icon: '✅', color: 'red' },
                        to: { name: 'Ministry of Trade', icon: '🏛️', color: 'orange' },
                        protocol: 'HTTP/REST',
                        method: 'GET',
                        endpoint: '/api/registry/check-name',
                        headers: {
                            'X-API-Key': 'ministry-api-key-secret',
                            'Content-Type': 'application/json'
                        },
                        request: {
                            name: 'ABC Trading PLC',
                            type: 'PLC',
                            region: 'Addis Ababa'
                        },
                        processing: 'Ministry database performs fuzzy matching, checks exact matches, returns similar names if any exist',
                        condition: 'Validation service requires external registry check',
                        timing: '300-800ms',
                        response: {
                            available: true,
                            exactMatch: false,
                            similarNames: [
                                'ABC Import Export',
                                'AB Trading PLC'
                            ],
                            registeredCount: 0
                        }
                    },
                    {
                        step: 7,
                        from: { name: 'Client Portal', icon: '👤', color: 'blue' },
                        to: { name: 'Application Service', icon: '📝', color: 'indigo' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/api/applications',
                        headers: {
                            'Authorization': 'Bearer eyJhbGci...',
                            'Content-Type': 'multipart/form-data'
                        },
                        request: {
                            serviceId: 'svc-business-license',
                            applicant: {
                                userId: 'usr-123456',
                                nationalId: 'ET-12345678'
                            },
                            businessInfo: {
                                name: 'ABC Trading PLC',
                                type: 'PLC',
                                sector: 'Import/Export',
                                capital: 500000,
                                owners: [
                                    {
                                        name: 'John Doe',
                                        share: 60,
                                        nationalId: 'ET-12345678'
                                    }
                                ]
                            },
                            documents: [
                                'business-plan.pdf',
                                'lease-agreement.pdf',
                                'id-copy.pdf'
                            ]
                        },
                        processing: 'Application Service validates all fields, generates unique application ID (ET-2026-XXXXX), stores in database, creates audit log entry',
                        condition: 'All validations passed, required documents uploaded, user clicks Submit',
                        timing: '500-1000ms',
                        response: {
                            applicationId: 'ET-2026-00123',
                            status: 'submitted',
                            submittedAt: '2026-03-03T10:30:00Z',
                            referenceNumber: 'BL-2026-00123',
                            nextSteps: [
                                'Ministry review (3-5 days)',
                                'Payment required after approval',
                                'License issuance'
                            ]
                        }
                    },
                    {
                        step: 8,
                        from: { name: 'Application Service', icon: '📝', color: 'indigo' },
                        to: { name: 'Orchestration Engine', icon: '⚙️', color: 'pink' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/internal/workflows/start',
                        headers: {
                            'X-Internal-Auth': 'service-token',
                            'Content-Type': 'application/json'
                        },
                        request: {
                            workflowType: 'business-license-application',
                            applicationId: 'ET-2026-00123',
                            context: {
                                userId: 'usr-123456',
                                serviceId: 'svc-business-license',
                                providerId: 'ministry-trade',
                                businessType: 'PLC'
                            },
                            steps: [
                                'ministry_review',
                                'payment_collection',
                                'final_approval',
                                'license_generation',
                                'document_delivery'
                            ]
                        },
                        processing: 'Orchestration Engine (Camunda) creates workflow instance, initializes state machine, sets up timers and timeouts',
                        condition: 'Application successfully created in database',
                        timing: '100-200ms',
                        response: {
                            workflowId: 'wf-2026-abc123',
                            instanceId: 'instance-xyz789',
                            currentStep: 'ministry_review',
                            status: 'active'
                        }
                    },
                    {
                        step: 9,
                        from: { name: 'Orchestration Engine', icon: '⚙️', color: 'pink' },
                        to: { name: 'Event Bus (Kafka)', icon: '📡', color: 'violet' },
                        protocol: 'Kafka/Event',
                        topic: 'application.events',
                        eventType: 'ApplicationSubmitted',
                        headers: {
                            'event-id': 'evt-123456',
                            'event-timestamp': '2026-03-03T10:30:05Z',
                            'event-version': '1.0'
                        },
                        payload: {
                            eventType: 'ApplicationSubmitted',
                            eventId: 'evt-123456',
                            timestamp: '2026-03-03T10:30:05Z',
                            data: {
                                applicationId: 'ET-2026-00123',
                                userId: 'usr-123456',
                                serviceType: 'business-license',
                                status: 'submitted',
                                workflowId: 'wf-2026-abc123'
                            }
                        },
                        processing: 'Event published to Kafka topic, partitioned by applicationId, replicated across 3 brokers for durability',
                        condition: 'Workflow successfully initialized',
                        timing: '< 10ms'
                    },
                    {
                        step: 10,
                        from: { name: 'Event Bus (Kafka)', icon: '📡', color: 'violet' },
                        to: { name: 'Notification Service', icon: '🔔', color: 'teal' },
                        protocol: 'Kafka/Subscribe',
                        consumerGroup: 'notification-service-group',
                        processing: 'Notification Service consumes event from Kafka, checks user notification preferences, selects appropriate channels (SMS/Email)',
                        condition: 'ApplicationSubmitted event available in topic',
                        timing: '50-100ms',
                        action: {
                            type: 'SEND_NOTIFICATION',
                            channels: ['SMS', 'EMAIL'],
                            template: 'application-submitted',
                            variables: {
                                applicationId: 'ET-2026-00123',
                                userName: 'John Doe',
                                serviceName: 'Business License'
                            }
                        }
                    },
                    {
                        step: 11,
                        from: { name: 'Notification Service', icon: '🔔', color: 'teal' },
                        to: { name: 'Client (SMS)', icon: '📱', color: 'blue' },
                        protocol: 'SMS/Twilio',
                        provider: 'Twilio SMS Gateway',
                        message: 'Your Business License application ET-2026-00123 has been received by Ministry of Trade. Track status at portal.gov.et',
                        processing: 'Notification Service calls Twilio API, message queued for delivery, delivery receipt tracked',
                        condition: 'User has valid phone number in profile',
                        timing: '1-3 seconds',
                        response: {
                            messageId: 'SM-twilio-abc123',
                            status: 'queued',
                            to: '+251911234567',
                            estimatedDelivery: '2026-03-03T10:30:10Z'
                        }
                    },
                    {
                        step: 12,
                        from: { name: 'Orchestration Engine', icon: '⚙️', color: 'pink' },
                        to: { name: 'Ministry of Trade Adapter', icon: '🏛️', color: 'orange' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: 'https://api.trade.gov.et/v1/applications',
                        headers: {
                            'Authorization': 'Bearer ministry-token',
                            'X-Correlation-ID': 'corr-xyz789',
                            'Content-Type': 'application/json'
                        },
                        request: {
                            externalId: 'ET-2026-00123',
                            applicationType: 'NEW_LICENSE',
                            businessData: {
                                name: 'ABC Trading PLC',
                                type: 'PLC',
                                sector: 'Import/Export',
                                capital: 500000
                            },
                            documents: [
                                {
                                    type: 'business_plan',
                                    url: 'https://storage.nuegp.gov.et/docs/business-plan.pdf',
                                    hash: 'sha256-hash'
                                }
                            ],
                            callback: {
                                url: 'https://api.nuegp.gov.et/callbacks/ministry-trade',
                                events: ['status_change', 'review_complete', 'approval']
                            }
                        },
                        processing: 'Ministry adapter transforms NUEGP format to Ministry API format, handles authentication, implements retry logic with exponential backoff',
                        condition: 'Workflow step: ministry_review, all documents uploaded',
                        timing: '500-2000ms',
                        response: {
                            ministryApplicationId: 'MOT-2026-5678',
                            status: 'received',
                            assignedReviewer: 'officer-123',
                            estimatedReviewDate: '2026-03-08T00:00:00Z'
                        }
                    },
                    {
                        step: 13,
                        from: { name: 'Ministry of Trade', icon: '🏛️', color: 'orange' },
                        to: { name: 'Ministry Adapter (Webhook)', icon: '🔗', color: 'orange' },
                        protocol: 'HTTP/REST (Webhook)',
                        method: 'POST',
                        endpoint: 'https://api.nuegp.gov.et/webhooks/ministry-trade',
                        headers: {
                            'X-Ministry-Signature': 'hmac-sha256-signature',
                            'Content-Type': 'application/json'
                        },
                        payload: {
                            eventType: 'REVIEW_APPROVED',
                            ministryApplicationId: 'MOT-2026-5678',
                            externalId: 'ET-2026-00123',
                            status: 'approved',
                            reviewedBy: 'officer-123',
                            reviewedAt: '2026-03-05T14:30:00Z',
                            comments: 'All documents verified. Proceed to payment.',
                            nextAction: 'PAYMENT_REQUIRED',
                            paymentAmount: 500.00
                        },
                        processing: 'Ministry system sends webhook after officer approval, HMAC signature verified by adapter, payload validated',
                        condition: 'Ministry officer completes review and approves application',
                        timing: 'Triggered by ministry action'
                    },
                    {
                        step: 14,
                        from: { name: 'Ministry Adapter', icon: '🔗', color: 'orange' },
                        to: { name: 'Orchestration Engine', icon: '⚙️', color: 'pink' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/internal/workflows/update',
                        request: {
                            workflowId: 'wf-2026-abc123',
                            event: 'MINISTRY_APPROVED',
                            data: {
                                status: 'approved',
                                nextStep: 'payment_collection',
                                paymentAmount: 500.00
                            }
                        },
                        processing: 'Orchestration Engine updates workflow state, triggers payment collection step, sets timeout for payment (24 hours)',
                        condition: 'Valid webhook received from ministry',
                        timing: '50-100ms'
                    },
                    {
                        step: 15,
                        from: { name: 'Orchestration Engine', icon: '⚙️', color: 'pink' },
                        to: { name: 'Payment Gateway', icon: '💳', color: 'emerald' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/api/payments/create',
                        request: {
                            applicationId: 'ET-2026-00123',
                            amount: 500.00,
                            currency: 'ETB',
                            purpose: 'Business License Fee',
                            userId: 'usr-123456',
                            callbackUrl: 'https://api.nuegp.gov.et/callbacks/payment',
                            expiresIn: 86400
                        },
                        processing: 'Payment Gateway generates payment reference, creates QR code, integrates with Telebirr/CBE APIs',
                        condition: 'Ministry approval received, payment required',
                        timing: '200-500ms',
                        response: {
                            paymentId: 'pay-2026-xyz123',
                            paymentReference: 'REF-ABC123',
                            amount: 500.00,
                            qrCode: 'base64-qr-code-data',
                            paymentUrl: 'https://payment.nuegp.gov.et/pay/xyz123',
                            expiresAt: '2026-03-04T10:30:00Z',
                            methods: ['telebirr', 'cbe', 'awash_bank']
                        }
                    },
                    {
                        step: 16,
                        from: { name: 'Client Portal', icon: '👤', color: 'blue' },
                        to: { name: 'Payment Gateway', icon: '💳', color: 'emerald' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: '/api/payments/execute',
                        request: {
                            paymentId: 'pay-2026-xyz123',
                            paymentMethod: 'telebirr',
                            phoneNumber: '+251911234567'
                        },
                        processing: 'Payment Gateway initiates Telebirr payment, user receives push notification on phone to confirm',
                        condition: 'User selects payment method and confirms',
                        timing: '1-5 seconds',
                        response: {
                            transactionId: 'txn-telebirr-789',
                            status: 'pending',
                            message: 'Please confirm payment on your phone'
                        }
                    },
                    {
                        step: 17,
                        from: { name: 'Telebirr/CBE', icon: '🏦', color: 'emerald' },
                        to: { name: 'Payment Gateway', icon: '💳', color: 'emerald' },
                        protocol: 'HTTP/REST (Callback)',
                        method: 'POST',
                        endpoint: '/callbacks/telebirr',

                            status: 'SUCCESS',
                            amount: 500.00,
                            currency: 'ETB',
                            paymentMethod: 'telebirr',
                            paidAt: '2026-03-03T10:35:00Z',
                            phoneNumber: '+251911234567'
                        },
                        processing: 'Payment Gateway receives confirmation, verifies signature, updates payment status, reconciles transaction',
                        condition: 'User confirms payment on Telebirr app',
                        timing: 'Varies (user action dependent)'
                    },
                    {
                        step: 18,
                        from: { name: 'Payment Gateway', icon: '💳', color: 'emerald' },
                        to: { name: 'Event Bus', icon: '📡', color: 'violet' },
                        protocol: 'Kafka/Event',
                        topic: 'payment.events',
                        eventType: 'PaymentCompleted',
                        payload: {
                            eventType: 'PaymentCompleted',
                            eventId: 'evt-pay-123',
                            timestamp: '2026-03-03T10:35:05Z',
                            data: {
                                paymentId: 'pay-2026-xyz123',
                                applicationId: 'ET-2026-00123',
                                transactionId: 'txn-telebirr-789',
                                amount: 500.00,
                                currency: 'ETB',
                                status: 'completed'
                            }
                        },
                        processing: 'Event published to Kafka for all interested consumers (orchestration, notification, audit)',
                        condition: 'Payment confirmed by provider',
                        timing: '< 10ms'
                    },
                    {
                        step: 19,
                        from: { name: 'Orchestration Engine', icon: '⚙️', color: 'pink' },
                        to: { name: 'Ministry Adapter', icon: '🔗', color: 'orange' },
                        protocol: 'HTTP/REST',
                        method: 'POST',
                        endpoint: 'https://api.trade.gov.et/v1/applications/MOT-2026-5678/finalize',
                        request: {

        function loadFlow(flowId) {
            const flow = flows[flowId];

            container.innerHTML = `
                <div class="bg-white rounded-lg shadow-xl p-8 mb-8">

                    <p class="text-gray-600 mb-4">${flow.description}</p>
                    <div class="flex gap-4">
                        <span class="text-sm bg-purple-100 text-purple-700 px-3 py-1 rounded-full">${flow.steps.length} steps</span>
                        <span class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Detailed interaction flow</span>
                    </div>
                </div>
            `;

            flow.steps.forEach((step, index) => {
                setTimeout(() => {
                    const stepDiv = createStepElement(step, index);
                    container.appendChild(stepDiv);
                    setTimeout(() => stepDiv.classList.add('visible'), 50);
                }, index * 200);
            });
        }

        function createStepElement(step, index) {
            const div = document.createElement('div');
            div.className = 'timeline-item bg-white rounded-lg shadow-lg p-6 mb-6';
            
            let content = `
                <div class="flex items-start gap-4 mb-4">
                    <div class="flex-shrink-0 w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 text-white rounded-full flex items-center justify-center font-bold text-lg">
                        ${step.step}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-2xl">${step.from.icon}</span>
                            <span class="font-bold text-lg text-gray-900">${step.from.name}</span>
                            <span class="text-2xl text-purple-500">→</span>
                            <span class="text-2xl">${step.to.icon}</span>
                            <span class="font-bold text-lg text-gray-900">${step.to.name}</span>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap mb-3">
                            <span class="protocol-badge">${step.protocol}</span>
            `;
            
            if (step.method) {
                const methodClass = step.method === 'GET' ? 'method-get' : 
                                   step.method === 'POST' ? 'method-post' : 
                                   step.method === 'PUT' ? 'method-put' : 'method-badge';
                content += `<span class="method-badge ${methodClass}">${step.method}</span>`;
            }
            
            if (step.statusCode) {
                content += `<span class="method-badge status-200">${step.statusCode}</span>`;
            }
            
            if (step.timing) {
                content += `<span class="text-xs bg-gray-200 px-2 py-1 rounded">⏱️ ${step.timing}</span>`;
            }
            
            content += `</div>`;
            
            if (step.endpoint) {
                content += `<div class="mb-3"><code class="text-sm bg-gray-100 px-3 py-1 rounded">${step.endpoint}</code></div>`;
            }
            
            if (step.condition) {
                content += `
                    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-3 rounded">
                        <div class="text-sm"><strong class="text-yellow-800">Condition:</strong> ${step.condition}</div>
                    </div>
                `;
            }
            
            if (step.processing) {
                content += `
                    <div class="bg-blue-50 border-l-4 border-blue-400 p-3 mb-3 rounded">
                        <div class="text-sm"><strong class="text-blue-800">Processing:</strong> ${step.processing}</div>
                    </div>
                `;
            }
            
            content += `</div></div>`;
            
            // Request/Response sections
            if (step.request || step.response || step.headers || step.payload) {
                content += `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4">`;
                
                if (step.headers) {
                    content += `
                        <div>
                            <div class="font-semibold text-sm text-gray-700 mb-2">Headers</div>
                            <div class="code-block">${JSON.stringify(step.headers, null, 2)}</div>
                        </div>
                    `;
                }
                
                if (step.request) {
                    content += `
                        <div>
                            <div class="font-semibold text-sm text-gray-700 mb-2">Request</div>
                            <div class="code-block">${JSON.stringify(step.request, null, 2)}</div>
                        </div>

                if (step.response) {
                    content += `
                        <div>

                            <div class="code-block">${JSON.stringify(step.payload, null, 2)}</div>
                        </div>
                    `;
                }
                
                content += `</div>`;
            }
            
            div.innerHTML = content;
            return div;
